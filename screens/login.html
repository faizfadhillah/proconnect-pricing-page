<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div style="min-height:100vh;display:flex;justify-content:flex-end;align-items:center;padding:40px;
  background:linear-gradient(rgba(10,15,25,.35),rgba(10,15,25,.55)),#243044;background-size:cover;background-position:center;">

  <div style="width:100%;max-width:360px;background:rgba(20,28,42,.55);backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:40px 34px;color:#fff;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:30px;">
      <svg width="84" height="84" viewBox="0 0 32 32" fill="none" style="margin:0 auto;"><circle cx="14" cy="14" r="9.5" stroke="#fff" stroke-width="2.4"/><circle cx="14" cy="14" r="3.2" fill="#fff"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>
      <div style="font-family:'Poppins',sans-serif;font-weight:600;font-size:24px;letter-spacing:-.02em;margin-top:6px;">proconnect</div>
    </div>

    <h2 style="font-size:22px;font-weight:700;">Sign In</h2>
    <p style="color:#cdd5e0;font-size:14px;margin-top:6px;">Please Sign in to your account to continue</p>

    <!-- Email -->
    <div style="margin-top:24px;border-bottom:1px solid rgba(255,255,255,.4);">
      <input type="email" placeholder="Insert Email Address" style="width:100%;background:none;border:none;outline:none;color:#fff;font:inherit;font-size:15px;padding:10px 0;">
    </div>
    <!-- Password -->
    <div style="margin-top:18px;border-bottom:1px solid rgba(255,255,255,.4);display:flex;align-items:center;">
      <input type="password" placeholder="Insert Password" style="flex:1;background:none;border:none;outline:none;color:#fff;font:inherit;font-size:15px;padding:10px 0;">
      <button style="background:none;border:none;cursor:pointer;color:#cdd5e0;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 8 10 8a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg></button>
    </div>

    <button class="btn btn-primary btn-block" style="margin-top:26px;padding:14px;letter-spacing:.04em;">SIGN IN</button>

    <p style="text-align:center;color:#cdd5e0;font-size:13px;margin-top:20px;">Or sign in via :</p>
    <button class="btn btn-block" style="background:#fff;color:var(--ink);margin-top:12px;padding:14px;letter-spacing:.04em;font-weight:700;">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.9l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.6 36.3 44 30.7 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
      GOOGLE
    </button>

    <p style="text-align:center;color:#cdd5e0;font-size:12.5px;margin-top:18px;line-height:1.6;">By continuing sign in, you agree to ProConnect <a href="#" style="color:#7fb0ff;text-decoration:underline;">Term of Service</a> and acknowledge our <a href="#" style="color:#7fb0ff;text-decoration:underline;">Privacy Policy</a></p>

    <a href="#" style="display:block;color:#7fb0ff;font-weight:700;font-size:14px;margin-top:18px;">Forget Password?</a>
    <a href="#" style="display:block;color:#7fb0ff;font-weight:700;font-size:14px;margin-top:12px;">Create an account</a>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
