<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Confirm Member Seat Move — Modal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body style="background:var(--bg);">
<div class="overlay">
  <div class="modal" style="max-width:640px;">
    <div class="modal-pad" style="padding:30px;">
      <div class="modal-head">
        <h3 style="font-size:30px;">Confirmation</h3>
        <button class="modal-close" data-close aria-label="Close"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>

      <div style="display:flex;align-items:center;gap:18px;margin-top:24px;">
        <span class="avatar" style="width:62px;height:62px;border-radius:50%;background:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=200&auto=format&fit=crop') center/cover;flex:none;display:block;"></span>
        <h3 style="font-size:26px;font-weight:700;">Move Cody Fisher to Full Seats?</h3>
      </div>

      <hr style="border:none;border-top:1px solid var(--line);margin:24px 0;">

      <!-- Current (target) seat: Full Seats with PIC Branch -->
      <div class="card" style="padding:18px;border-color:var(--line);">
        <div style="display:flex;align-items:center;gap:16px;">
          <span class="seat-ic lg seat-ic-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
          <div style="flex:1;">
            <b style="font-size:22px;font-family:'Poppins',sans-serif;display:block;margin-bottom:10px;">Full Seats</b>
            <span style="display:flex;align-items:center;gap:12px;background:var(--blue-soft);border:1px solid #cfe0fb;border-radius:12px;padding:12px 16px;">
              <span style="width:24px;height:24px;background:var(--blue);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;flex:none;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
              <b style="font-size:18px;">PIC Branch</b>
            </span>
          </div>
          <span class="badge badge-gray" style="font-size:15px;padding:8px 16px;align-self:flex-start;">Current</span>
        </div>
      </div>

      <div style="text-align:center;color:var(--ink);margin:18px 0;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto;"><line x1="12" y1="4" x2="12" y2="20"/><polyline points="6 14 12 20 18 14"/></svg>
      </div>

      <!-- Target seat: Free Seats -->
      <div class="card" style="padding:18px;border:1px solid var(--blue);">
        <div style="display:flex;align-items:center;gap:16px;">
          <span class="seat-ic lg seat-ic-gray"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></span>
          <div style="flex:1;">
            <b style="font-size:22px;font-family:'Poppins',sans-serif;">Free Seats</b>
            <div class="muted" style="font-size:18px;margin-top:4px;">All other employees</div>
          </div>
        </div>
      </div>

      <div style="background:#eef6ff;border-radius:12px;padding:20px;margin-top:16px;">
        <p style="font-size:17px;">You will downgrade the seat type, then the "Full" seat will be available.</p>
        <a href="#" style="display:inline-block;margin-top:14px;font-weight:700;font-size:17px;">Learn more about seats</a>
      </div>

      <div class="modal-foot" style="margin-top:30px;gap:16px;">
        <button class="btn btn-outline btn-lg" data-close>Back</button>
        <button class="btn btn-primary btn-lg">Confirm</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
