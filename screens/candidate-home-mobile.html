<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Candidate Home — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile">
  <div class="m-header">
    <button class="hamburger" aria-label="Menu" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" aria-label="Notifications" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>

  <div class="m-body" style="text-align:center;">
    <h1 style="font-size:34px;font-weight:800;margin-top:14px;">Choose Your Role</h1>
    <p class="muted" style="font-size:16px;margin-top:6px;">Please select one from below:</p>

    <!-- Candidate card -->
    <div class="card" style="overflow:hidden;border-radius:18px;margin-top:30px;text-align:center;box-shadow:var(--shadow);">
      <div style="height:170px;background:linear-gradient(135deg,#3b4252,#6b7280);"></div>
      <div style="padding:22px 22px 26px;">
        <h2 style="font-size:26px;font-weight:800;">Candidate</h2>
        <p class="muted" style="font-size:15px;margin-top:12px;">Fresh graduate, mid-level employee, or an expert level currently looking for a new opportunity.</p>
        <button class="btn btn-outline btn-block" style="margin-top:20px;padding:15px;font-size:15px;">Continue as Candidate</button>
      </div>
    </div>

    <!-- Employer card -->
    <div class="card" style="overflow:hidden;border-radius:18px;margin-top:30px;text-align:center;box-shadow:var(--shadow);">
      <div style="height:170px;background:linear-gradient(135deg,#1f2937,#4b5563);position:relative;">
        <span class="badge" style="position:absolute;right:14px;bottom:14px;background:#fbeec1;color:#d97706;font-weight:700;font-size:13px;padding:7px 14px;">*subscription needed</span>
      </div>
      <div style="padding:22px 22px 26px;">
        <h2 style="font-size:26px;font-weight:800;">Employer</h2>
        <p class="muted" style="font-size:15px;margin-top:12px;">HR Department or Company owner who seeks professional expertise to expand their business.</p>
        <button class="btn btn-outline btn-block" style="margin-top:20px;padding:15px;font-size:15px;">Continue as Employer</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
