<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Remove Seats — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<!-- Faint dashboard backdrop -->
<div class="mobile" aria-hidden="true">
  <div class="m-header">
    <button class="hamburger" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>
  <div class="m-body">
    <h1 style="font-size:28px;font-weight:700;">Subscription &amp; Billing</h1>
    <p class="muted" style="margin-top:8px;font-size:14px;">Manage your subscription and billing details here.</p>
    <h2 class="section-title" style="font-size:20px;margin-top:140px;">Payment Method</h2>
    <div class="card" style="padding:16px;margin-top:16px;display:flex;align-items:center;gap:14px;">
      <span style="width:56px;height:40px;border-radius:8px;background:#fff;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;flex:none;font-family:'Poppins',sans-serif;font-weight:800;font-style:italic;color:#1a1f71;font-size:15px;">VISA</span>
      <div><b style="font-size:15px;letter-spacing:.5px;">**** **** **** 3627</b><div class="muted" style="font-size:13px;">Expiry 02/26</div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" style="align-items:center;">
  <div class="modal modal-sm" style="max-width:360px;border-radius:18px;">
    <div class="modal-pad" style="padding:26px;">
      <div class="modal-head">
        <h3 style="font-size:24px;font-weight:700;">Confirmation</h3>
        <button class="modal-close" data-close aria-label="Close"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>

      <!-- Info banner -->
      <div style="background:var(--blue-soft);border-radius:12px;padding:18px 16px;margin-top:20px;display:flex;align-items:flex-start;gap:12px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <p style="font-size:18px;line-height:1.35;">To delete the seats only for the available seat</p>
      </div>

      <h4 style="font-size:22px;font-weight:700;margin-top:28px;">Select seats to remove</h4>

      <!-- Full Seats counter -->
      <div class="card" style="padding:16px;margin-top:18px;border-color:var(--line);">
        <div style="display:flex;align-items:center;gap:14px;background:var(--bg);border-radius:12px;padding:12px;">
          <span class="seat-ic lg seat-ic-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
          <div><b style="font-size:18px;font-family:'Poppins',sans-serif;">Full Seats</b><div class="muted" style="font-size:15px;">1 Avail</div></div>
        </div>
        <div class="counter" data-min="0" style="display:flex;align-items:center;justify-content:center;gap:24px;margin-top:18px;">
          <button data-act="dec" style="width:58px;height:48px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">−</button>
          <span class="counter-val" style="min-width:24px;text-align:center;font-weight:700;font-size:20px;">1</span>
          <button data-act="inc" style="width:58px;height:48px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">+</button>
        </div>
      </div>

      <!-- Dept Seats counter -->
      <div class="card" style="padding:16px;margin-top:18px;border-color:var(--line);">
        <div style="display:flex;align-items:center;gap:14px;background:var(--bg);border-radius:12px;padding:12px;">
          <span class="seat-ic lg seat-ic-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/><circle cx="12" cy="14" r="3"/></svg></span>
          <div><b style="font-size:18px;font-family:'Poppins',sans-serif;">Dept Seats</b><div class="muted" style="font-size:15px;">1 Avail</div></div>
        </div>
        <div class="counter" data-min="0" style="display:flex;align-items:center;justify-content:center;gap:24px;margin-top:18px;">
          <button data-act="dec" style="width:58px;height:48px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">−</button>
          <span class="counter-val" style="min-width:24px;text-align:center;font-weight:700;font-size:20px;">1</span>
          <button data-act="inc" style="width:58px;height:48px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">+</button>
        </div>
      </div>

      <div class="modal-foot" style="flex-direction:column;gap:12px;margin-top:30px;">
        <button class="btn btn-lg btn-block" style="background:var(--red);color:#fff;">Remove Seats</button>
        <button class="btn btn-outline btn-lg btn-block" data-close>Cancel</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
