<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Billing — Cancel Success Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile">
  <div class="m-header">
    <button class="hamburger" aria-label="Menu" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" aria-label="Notifications" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>

  <!-- Success banner + subtitle strip on faint bg -->
  <div style="background:var(--bg);padding:18px 18px 22px;border-bottom:1px solid var(--line);">
    <div style="background:var(--green);color:#fff;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
      <b style="font-size:18px;font-family:'Poppins',sans-serif;flex:1;">Success cancel subscribe</b>
      <button data-close aria-label="Close" style="background:none;border:none;color:#fff;cursor:pointer;display:inline-flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
    </div>
    <p class="muted" style="margin-top:14px;font-size:15px;">Manage your subscription and billing details here.</p>
  </div>

  <div class="m-body">
    <!-- Current subscription -->
    <h2 class="section-title" style="font-size:21px;">Current Subscription</h2>
    <p class="muted" style="font-size:15px;margin-top:6px;">You are currently in Free Seats</p>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0;">

    <!-- Member seats row -->
    <div class="card card-pad" style="background:var(--bg);border-color:var(--line);display:flex;align-items:center;gap:14px;">
      <span class="seat-ic lg seat-ic-gray"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></span>
      <div style="flex:1;"><b style="font-size:17px;font-family:'Poppins',sans-serif;">Member Seats</b><div class="muted" style="font-size:14px;">12 Seats</div></div>
      <span class="badge badge-blue" style="font-size:14px;padding:5px 12px;">Active</span>
    </div>

    <!-- Price / Next billing -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;">
      <div class="card card-pad" style="background:var(--bg);border-color:var(--line);">
        <div class="muted" style="font-size:14px;">Price</div>
        <div style="font-weight:700;font-size:17px;margin-top:8px;">-</div>
      </div>
      <div class="card card-pad" style="background:var(--bg);border-color:var(--line);">
        <div class="muted" style="font-size:14px;">Next Billing</div>
        <div style="font-weight:700;font-size:17px;margin-top:8px;">-</div>
      </div>
    </div>

    <button class="btn btn-outline btn-block btn-lg" style="margin-top:16px;">Upgrade</button>

    <hr style="border:none;border-top:1px solid var(--line);margin:24px 0;">

    <!-- Payment Method -->
    <h2 class="section-title" style="font-size:21px;">Payment Method</h2>
    <p class="muted" style="font-size:15px;margin-top:6px;">Manage your payment detials</p>

    <div class="card" style="padding:18px;margin-top:16px;border-color:var(--line);display:flex;align-items:center;gap:16px;">
      <span style="width:64px;height:46px;border-radius:8px;background:#fff;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;flex:none;font-family:'Poppins',sans-serif;font-weight:800;font-style:italic;color:#1a1f71;font-size:17px;">VISA</span>
      <div>
        <b style="font-size:16px;letter-spacing:.5px;">**** **** **** 3627</b>
        <div class="muted" style="font-size:14px;margin-top:2px;">Expiry 02/26</div>
      </div>
    </div>

    <button class="btn btn-outline btn-block btn-lg" style="margin-top:18px;">Update Payment Method</button>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
