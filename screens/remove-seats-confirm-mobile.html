<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Remove Seats — Confirm Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile" style="position:relative;">
  <div class="m-header">
    <button class="hamburger" aria-label="Menu" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" aria-label="Notifications" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>

  <!-- faint backdrop content -->
  <div class="m-body" style="opacity:.4;">
    <div style="height:18px;"></div>
    <div style="display:flex;align-items:center;gap:14px;border-top:1px solid var(--line);padding-top:18px;">
      <svg width="44" height="44" viewBox="0 0 48 32" fill="none"><rect width="48" height="32" rx="4" fill="#1a1f71"/><text x="24" y="22" text-anchor="middle" font-family="Poppins" font-weight="800" font-size="14" font-style="italic" fill="#fff">VISA</text></svg>
      <div>
        <b style="font-size:16px;letter-spacing:.06em;">**** **** **** 3627</b>
        <div class="muted" style="font-size:13px;margin-top:2px;">Expiry 02/26</div>
      </div>
    </div>
  </div>

  <!-- overlay modal -->
  <div class="overlay" style="position:absolute;align-items:center;padding:24px 16px;">
    <div class="modal modal-sm" style="max-width:100%;">
      <div class="modal-pad">
        <div class="modal-head">
          <h3 style="font-size:24px;">Confirmation</h3>
          <button class="modal-close" data-close><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
        </div>

        <!-- info note -->
        <div style="display:flex;gap:12px;background:var(--blue-soft);border-radius:12px;padding:16px;margin-top:18px;">
          <span style="color:var(--blue);flex:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
          <span style="font-size:16px;color:var(--ink-2);">To delete the seats only for the available seat</span>
        </div>

        <h4 style="text-align:center;font-size:20px;font-weight:700;margin-top:22px;">Select seats to remove</h4>

        <!-- Full Seats -->
        <div class="card" style="margin-top:18px;padding:14px;">
          <div style="display:flex;align-items:center;gap:14px;background:var(--bg);border-radius:12px;padding:12px;">
            <span class="seat-ic lg seat-ic-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
            <div>
              <b style="font-size:18px;font-family:'Poppins',sans-serif;">Full Seats</b>
              <div class="muted" style="font-size:15px;">1 Avail</div>
            </div>
          </div>
          <div class="counter" data-min="0" style="display:flex;align-items:center;justify-content:center;gap:18px;margin-top:18px;">
            <button class="pager" data-act="dec" style="width:52px;height:52px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">−</button>
            <span class="counter-val" style="min-width:24px;text-align:center;font-weight:700;font-size:22px;">0</span>
            <button class="pager" data-act="inc" style="width:52px;height:52px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">+</button>
          </div>
        </div>

        <!-- Dept Seats -->
        <div class="card" style="margin-top:18px;padding:14px;">
          <div style="display:flex;align-items:center;gap:14px;background:var(--bg);border-radius:12px;padding:12px;">
            <span class="seat-ic lg seat-ic-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/><circle cx="12" cy="14" r="3"/></svg></span>
            <div>
              <b style="font-size:18px;font-family:'Poppins',sans-serif;">Dept Seats</b>
              <div class="muted" style="font-size:15px;">1 Avail</div>
            </div>
          </div>
          <div class="counter" data-min="0" style="display:flex;align-items:center;justify-content:center;gap:18px;margin-top:18px;">
            <button class="pager" data-act="dec" style="width:52px;height:52px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">−</button>
            <span class="counter-val" style="min-width:24px;text-align:center;font-weight:700;font-size:22px;">0</span>
            <button class="pager" data-act="inc" style="width:52px;height:52px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;font-size:24px;box-shadow:var(--shadow-sm);">+</button>
          </div>
        </div>

        <!-- footer buttons -->
        <button class="btn btn-block btn-lg" style="margin-top:24px;background:#b9bcc2;color:#fff;font-size:16px;" disabled>Remove Seats</button>
        <button class="btn btn-outline btn-block btn-lg" data-close style="margin-top:14px;font-size:16px;">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
