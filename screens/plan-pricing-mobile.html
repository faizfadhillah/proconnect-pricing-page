<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Plan & Pricing — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile">
  <div class="m-header">
    <button class="hamburger" aria-label="Menu" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" aria-label="Notifications" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>

  <div class="m-body">
    <!-- Success toast -->
    <div style="background:var(--green);color:#fff;border-radius:12px;padding:16px;display:flex;align-items:flex-start;gap:12px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:1px;"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
      <b style="flex:1;font-size:15px;line-height:1.35;">Success edit subscribe, the price will be updated by system</b>
      <button style="background:none;border:none;color:#fff;cursor:pointer;flex:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
    </div>

    <!-- Current subscription -->
    <h1 style="font-size:24px;font-weight:700;margin-top:22px;">Current Subscription</h1>
    <p class="muted" style="margin-top:8px;font-size:16px;">You are currently in Free Seats</p>

    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0;">

    <!-- Full seats -->
    <div class="card card-pad" style="background:var(--bg);display:flex;align-items:center;gap:14px;">
      <span class="seat-ic lg seat-ic-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
      <div><b style="font-size:18px;font-family:'Poppins',sans-serif;">Full Seats</b><div class="muted" style="font-size:15px;">5 seats</div></div>
    </div>

    <!-- Dept seats -->
    <div class="card card-pad" style="background:var(--bg);display:flex;align-items:center;gap:14px;margin-top:16px;">
      <span class="seat-ic lg seat-ic-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/><circle cx="12" cy="14" r="3"/></svg></span>
      <div><b style="font-size:18px;font-family:'Poppins',sans-serif;">Dept Seats</b><div class="muted" style="font-size:15px;">1 seats</div></div>
    </div>

    <!-- Price + next billing -->
    <div style="display:flex;gap:14px;margin-top:18px;">
      <div class="card card-pad" style="flex:1;background:var(--bg);">
        <div class="muted" style="font-size:14px;">Price</div>
        <b style="font-size:18px;font-family:'Poppins',sans-serif;display:block;margin-top:6px;">Rp 2.500.000</b>
      </div>
      <div class="card card-pad" style="flex:1;background:var(--bg);">
        <div class="muted" style="font-size:14px;">Next Billing</div>
        <b style="font-size:18px;font-family:'Poppins',sans-serif;display:block;margin-top:6px;">Feb 28, 2026</b>
      </div>
    </div>

    <button class="btn btn-outline btn-block btn-lg" style="margin-top:18px;font-size:16px;">Change Cycle</button>
    <button class="btn btn-danger btn-block btn-lg" style="margin-top:14px;font-size:16px;">Cancel Subscription</button>

    <!-- Payment method -->
    <div style="border-top:1px solid var(--line);margin-top:24px;padding-top:22px;">
      <h2 style="font-size:24px;font-weight:700;">Payment Method</h2>
      <p class="muted" style="margin-top:8px;font-size:16px;">Manage your payment detials</p>
    </div>

    <div class="card card-pad" style="margin-top:16px;display:flex;align-items:center;gap:16px;">
      <span style="width:56px;height:40px;border:1px solid var(--line);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;background:#fff;flex:none;font-family:'Poppins',sans-serif;font-style:italic;font-weight:800;color:#1a1f71;font-size:15px;">VISA</span>
      <div><b style="font-size:18px;letter-spacing:1px;">**** **** **** 3627</b><div class="muted" style="font-size:14px;margin-top:2px;">Expiry 02/26</div></div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
