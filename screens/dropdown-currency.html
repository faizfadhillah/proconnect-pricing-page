<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Dropdown — Currency Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body style="background:var(--bg);display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:80px 16px;">
<div style="width:100%;max-width:300px;">
  <div class="card" style="overflow:hidden;box-shadow:var(--shadow);">
    <!-- search input row -->
    <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--light)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" value="SG" style="border:none;outline:none;font:600 16px 'Inter',sans-serif;flex:1;background:none;color:var(--ink);">
    </div>
    <!-- option -->
    <button style="width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:14px 16px;font-size:16px;color:var(--ink);font-family:'Inter',sans-serif;">
      (<b>SG</b>D) Singapore
    </button>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
