<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Remove Seats — Modal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
<style>
  .seat-counter { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:18px; }
  .seat-counter .cbtn { width:64px; height:50px; border:1px solid var(--line); background:#fff; border-radius:12px;
    box-shadow:var(--shadow-sm); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; color:var(--ink-2); }
  .seat-counter .cbtn:hover { background:var(--bg); }
  .seat-counter .counter-val { font-size:22px; font-weight:700; min-width:32px; text-align:center; }
  .seat-block { border:1px solid var(--line); border-radius:14px; padding:16px; }
  .seat-head { display:flex; align-items:center; gap:14px; background:#f7f8fa; border-radius:12px; padding:14px 16px; }
</style>
</head><body style="background:var(--bg);">
<div class="overlay">
  <div class="modal modal-sm" style="max-width:420px;">
    <div class="modal-pad">
      <div class="modal-head">
        <h3 style="font-size:24px;">Confirmation</h3>
        <button class="modal-close" data-close aria-label="Close"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>

      <!-- info banner -->
      <div style="display:flex;align-items:center;gap:14px;background:#eef6ff;border-radius:12px;padding:16px;margin-top:20px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <p style="flex:1;font-size:15px;">To remove the seats only for the available seat, please setting your seats member first</p>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>

      <h3 style="text-align:center;font-size:21px;font-weight:700;margin:26px 0 18px;">Select seats to remove</h3>

      <!-- Full Seats -->
      <div class="seat-block" style="margin-bottom:18px;">
        <div class="seat-head">
          <span class="seat-ic lg seat-ic-blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
          <div>
            <b style="font-size:18px;font-family:'Poppins',sans-serif;">Full Seats</b>
            <div class="muted" style="font-size:14px;">0 Avail</div>
          </div>
        </div>
        <div class="counter seat-counter" data-min="0">
          <button class="cbtn" data-act="dec" aria-label="Decrease"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <span class="counter-val">0</span>
          <button class="cbtn" data-act="inc" aria-label="Increase"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>

      <!-- Dept Seats -->
      <div class="seat-block">
        <div class="seat-head">
          <span class="seat-ic lg seat-ic-green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.2"/><circle cx="7.5" cy="15" r="3.2"/><circle cx="16.5" cy="15" r="3.2"/></svg></span>
          <div>
            <b style="font-size:18px;font-family:'Poppins',sans-serif;">Dept Seats</b>
            <div class="muted" style="font-size:14px;">1 Avail</div>
          </div>
        </div>
        <div class="counter seat-counter" data-min="0">
          <button class="cbtn" data-act="dec" aria-label="Decrease"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <span class="counter-val">0</span>
          <button class="cbtn" data-act="inc" aria-label="Increase"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>

      <div class="modal-foot" style="flex-direction:column;gap:12px;margin-top:28px;">
        <button class="btn btn-lg btn-block" style="background:#b3b8c0;color:#fff;cursor:not-allowed;">Remove Seats</button>
        <button class="btn btn-outline btn-lg btn-block" data-close>Cancel</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
