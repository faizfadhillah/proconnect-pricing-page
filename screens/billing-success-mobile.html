<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Billing — Success Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<!-- Faint dashboard (Team Admin) backdrop -->
<div class="mobile" aria-hidden="true">
  <div class="m-header">
    <button class="hamburger" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>
  <div class="m-body">
    <h1 style="font-size:28px;font-weight:700;">Team Admin</h1>
    <p class="muted" style="margin-top:8px;font-size:14px;">Manage your team members and their roles</p>
    <button class="btn btn-outline btn-block" style="margin-top:320px;gap:8px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Invite Member</button>
    <div class="search" style="margin-top:14px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--light)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Search name or email" disabled>
    </div>
  </div>
</div>

<!-- Confirmation modal -->
<div class="overlay" style="align-items:center;">
  <div class="modal modal-sm" style="max-width:360px;border-radius:18px;">
    <div class="modal-pad" style="padding:26px;">
      <div class="modal-head">
        <h3 style="font-size:24px;font-weight:700;">Confirmation</h3>
        <button class="modal-close" data-close aria-label="Close"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>

      <div style="display:flex;align-items:center;gap:14px;margin-top:20px;">
        <span class="avatar" style="width:50px;height:50px;border-radius:50%;background:#3b2f29;flex:none;overflow:hidden;display:block;"></span>
        <h3 style="font-size:19px;font-weight:700;">Move Cody Fisher to Full Seats?</h3>
      </div>

      <hr style="border:none;border-top:1px solid var(--line);margin:20px 0;">

      <!-- Current seat -->
      <div class="card" style="padding:14px;border-color:var(--line);">
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="seat-ic lg seat-ic-gray"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></span>
          <div style="flex:1;">
            <b style="font-size:16px;font-family:'Poppins',sans-serif;">Member Company</b>
            <div class="muted" style="font-size:13px;">All other employees</div>
          </div>
          <span class="badge badge-gray" style="font-size:13px;padding:5px 12px;">Current</span>
        </div>
      </div>

      <div style="text-align:center;color:var(--ink);margin:14px 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto;"><line x1="12" y1="4" x2="12" y2="20"/><polyline points="6 14 12 20 18 14"/></svg>
      </div>

      <!-- Target seat -->
      <div class="card" style="padding:14px;border-color:var(--line);">
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="seat-ic lg seat-ic-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
          <div style="flex:1;">
            <b style="font-size:16px;font-family:'Poppins',sans-serif;display:block;margin-bottom:8px;">Full Seats</b>
            <span style="display:inline-flex;align-items:center;gap:10px;background:var(--blue-soft);border:1px solid #cfe0fb;border-radius:10px;padding:8px 12px;">
              <span style="width:20px;height:20px;background:var(--blue);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;flex:none;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
              <b style="font-size:15px;">PIC Branch</b>
            </span>
          </div>
        </div>
      </div>

      <div class="modal-foot" style="flex-direction:column;gap:12px;margin-top:26px;">
        <button class="btn btn-primary btn-lg btn-block">Confirm</button>
        <button class="btn btn-outline btn-lg btn-block" data-close>Back</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
