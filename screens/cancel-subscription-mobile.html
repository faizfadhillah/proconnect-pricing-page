<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Cancel Subscription — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<!-- Faint dashboard backdrop -->
<div class="mobile" aria-hidden="true">
  <div class="m-header">
    <button class="hamburger" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>
  <div class="m-body">
    <h1 style="font-size:30px;font-weight:700;">Subscription &amp; Billing</h1>
    <p class="muted" style="margin-top:8px;font-size:14px;">Manage your subscription and billing details here.</p>
    <div class="between" style="margin-top:26px;"><h2 class="section-title" style="font-size:21px;">Current Subscription</h2><button class="btn btn-outline btn-sm">Upgrade</button></div>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0;">
    <h2 class="section-title" style="font-size:21px;margin-top:80px;">Payment Method</h2>
    <p class="muted" style="font-size:14px;margin-top:6px;">Manage your payment detials</p>
    <div class="card" style="padding:18px;margin-top:16px;display:flex;align-items:center;gap:16px;">
      <span style="width:60px;height:42px;border-radius:8px;background:#fff;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;flex:none;font-family:'Poppins',sans-serif;font-weight:800;font-style:italic;color:#1a1f71;font-size:16px;">VISA</span>
      <div><b style="font-size:15px;letter-spacing:.5px;">**** **** **** 3627</b><div class="muted" style="font-size:13px;">Expiry 02/26</div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" style="align-items:center;">
  <div class="modal modal-sm" style="max-width:360px;border-radius:18px;">
    <div class="modal-pad" style="padding:30px 26px;">
      <div style="display:flex;justify-content:flex-end;">
        <button class="modal-close" data-close aria-label="Close"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>

      <div style="text-align:center;margin-top:6px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:84px;height:84px;border:3px solid var(--red);border-radius:50%;color:var(--red);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M8 16c1-1.5 2.5-2 4-2s3 .5 4 2"/></svg>
        </span>
      </div>

      <h3 style="text-align:center;font-size:22px;font-weight:700;margin-top:22px;">Do you want to Cancel your plan?</h3>
      <p class="muted" style="text-align:center;font-size:15px;margin-top:12px;">Are you sure you want to cancel plan?</p>

      <div class="modal-foot" style="flex-direction:column;gap:12px;margin-top:30px;">
        <button class="btn btn-lg btn-block" style="background:var(--red);color:#fff;">Cancel subscription</button>
        <button class="btn btn-outline btn-lg btn-block" data-close>Back</button>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
