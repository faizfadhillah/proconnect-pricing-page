<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Team Member Role Assignment — Modal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
<style>
  .tr-form .field > label { font-size:16px; color:var(--ink); font-weight:600; margin-bottom:10px; }
  .tr-form .field > label .req { color:var(--red); }
  .tr-form .select, .tr-form .input { font-size:19px; font-weight:600; color:#0b2540; padding:16px 18px; border-radius:12px; }
  .tr-form .input::placeholder { color:var(--light); font-weight:500; }
  .tr-form .disabled { background:#f6f7f9; color:var(--light); }
  .role-pop { position:absolute; left:0; right:0; top:calc(100% + 8px); background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow-lg); overflow:hidden; z-index:5; }
  .role-pop .pop-head { font-family:'Poppins',sans-serif; font-weight:700; font-size:20px; padding:18px 20px; border-bottom:1px solid var(--line-2); background:#fdfdfe; }
  .role-grp { padding:16px 20px; }
  .role-grp + .role-grp { border-top:1px solid var(--line-2); }
  .role-grp-head { display:flex; align-items:center; gap:14px; font-family:'Poppins',sans-serif; font-weight:700; font-size:21px; }
  .role-opt { display:flex; align-items:center; gap:14px; border:1px solid var(--line); border-radius:12px; padding:14px 18px; margin-top:12px; font-size:19px; }
  .role-opt.checked { background:var(--blue-soft); border-color:#cfe0fb; }
  .ro-radio { width:24px; height:24px; border-radius:50%; border:2px solid var(--line); flex:none; }
  .ro-check { width:24px; height:24px; border-radius:7px; background:var(--blue); display:inline-flex; align-items:center; justify-content:center; flex:none; }
</style>
</head><body style="background:var(--bg);">
<div class="overlay">
  <div class="modal" style="max-width:1000px;">
    <div class="modal-pad" style="padding:30px 34px 36px;">
      <div class="collapse-head" style="font-size:30px;font-family:'Poppins',sans-serif;">
        Team Role
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
      </div>

      <div class="tr-form" style="display:grid;grid-template-columns:1fr 1fr;gap:30px 36px;margin-top:24px;">
        <!-- Left column -->
        <div>
          <div class="field">
            <label>Placement Branch<span class="req">*</span></label>
            <div class="select">Semarang</div>
          </div>
          <div class="field">
            <label>Department<span class="req">*</span></label>
            <div class="select">Human Resource</div>
          </div>
          <div class="field">
            <label>Employee Type<span class="req">*</span></label>
            <div class="select">Full Time</div>
          </div>
          <div class="field">
            <label>End Date<span class="req">*</span></label>
            <div class="select disabled">Select end date</div>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>Status<span class="req">*</span></label>
            <div class="select">Active</div>
          </div>
        </div>

        <!-- Right column: Role with open dropdown -->
        <div style="position:relative;">
          <div class="field">
            <label style="display:flex;align-items:center;gap:8px;">Role<span class="req">*</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </label>
            <div class="select" style="border:2px solid var(--blue);box-shadow:0 0 0 3px var(--blue-soft);">Member</div>
          </div>

          <div class="role-pop">
            <div class="pop-head">Available seats</div>

            <div class="role-grp">
              <div class="role-grp-head">
                <span class="seat-ic seat-ic-blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
                Full Seats
              </div>
              <div class="role-opt checked">
                <span class="ro-check"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                PIC Branch
              </div>
              <div class="role-opt">
                <span class="ro-radio"></span>
                HRD Branch
              </div>
            </div>

            <div class="role-grp">
              <div class="role-grp-head">
                <span class="seat-ic seat-ic-green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="3"/><circle cx="15" cy="9" r="3"/><circle cx="12" cy="14" r="3"/></svg></span>
                Dept Seats
              </div>
              <div class="role-opt">
                <span class="ro-radio"></span>
                Dept Head HQ
              </div>
              <div class="role-opt">
                <span class="ro-radio"></span>
                Dept Head Branch
              </div>
            </div>

            <div class="role-grp">
              <div class="role-grp-head">
                <span class="seat-ic seat-ic-gray"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></span>
                Free Seats
                <span class="badge badge-blue" style="font-size:14px;padding:5px 14px;margin-left:8px;">Current</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
