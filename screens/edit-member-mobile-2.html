<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Edit Team Member — Mobile (Alt)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile" style="position:relative;background:var(--bg);">
  <!-- bottom-sheet style modal -->
  <div class="modal" style="max-width:100%;border-radius:20px 20px 0 0;min-height:100vh;display:flex;flex-direction:column;">
    <div class="modal-pad" style="flex:1;padding-bottom:96px;">
      <!-- grab handle -->
      <div style="width:48px;height:5px;border-radius:3px;background:#d1d5db;margin:0 auto 18px;"></div>

      <div class="modal-head">
        <h3 style="font-size:24px;">Edit Team Member</h3>
        <button class="modal-close"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>

      <!-- Team Role section -->
      <div class="collapse-head" style="margin-top:20px;font-size:21px;">
        Team Role
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </div>

      <div class="field" style="margin-top:14px;">
        <label style="font-size:15px;display:flex;align-items:center;gap:6px;">Role <span class="req">*</span>
          <span style="color:var(--blue);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
        </label>
        <!-- open select trigger -->
        <div style="display:flex;align-items:center;border:1.5px solid var(--blue);border-radius:12px;padding:14px 16px;box-shadow:0 0 0 3px var(--blue-soft);">
          <b style="font-size:17px;color:var(--blue);flex:1;">Member</b>
          <span style="color:var(--blue);"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></span>
        </div>

        <!-- dropdown panel -->
        <div class="card" style="margin-top:6px;padding:0;overflow:hidden;box-shadow:var(--shadow);">
          <!-- Available seats group -->
          <div style="background:var(--bg);padding:14px 16px;font-weight:700;font-size:17px;">Available seats</div>
          <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-top:1px solid var(--line-2);">
            <span class="seat-ic seat-ic-gray"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></span>
            <b style="font-size:17px;">Free Seats</b>
            <span class="badge badge-blue" style="font-size:14px;padding:5px 14px;">Current</span>
          </div>

          <!-- Upgrade to get Seats -->
          <div style="background:var(--bg);padding:14px 16px;font-weight:700;font-size:17px;border-top:1px solid var(--line-2);">Upgrade to get Seats</div>

          <!-- Full Seats -->
          <div style="padding:14px 16px;">
            <div class="between">
              <div style="display:flex;align-items:center;gap:12px;">
                <span class="seat-ic seat-ic-blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 12 4l10 5-10 5L2 9z"/><path d="M5 11v5c0 1 3 3 7 3s7-2 7-3v-5"/></svg></span>
                <b style="font-size:17px;">Full Seats</b>
              </div>
              <b style="font-size:17px;color:var(--blue);">Rp 250.000/mo</b>
            </div>
            <label style="display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;cursor:pointer;">
              <span style="width:22px;height:22px;border-radius:50%;border:2px solid #cbd2dc;flex:none;"></span>
              <span style="font-size:17px;">PIC Branch</span>
            </label>
            <label style="display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:10px;cursor:pointer;">
              <span style="width:22px;height:22px;border-radius:50%;border:2px solid #cbd2dc;flex:none;"></span>
              <span style="font-size:17px;">HRD Branch</span>
            </label>
          </div>

          <!-- Dept Seats -->
          <div style="padding:14px 16px;border-top:1px solid var(--line-2);">
            <div class="between">
              <div style="display:flex;align-items:center;gap:12px;">
                <span class="seat-ic seat-ic-green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/><circle cx="12" cy="14" r="3"/></svg></span>
                <b style="font-size:17px;">Dept Seats</b>
              </div>
              <b style="font-size:17px;color:var(--blue);">Rp 150.000/mo</b>
            </div>
            <label style="display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;cursor:pointer;">
              <span style="width:22px;height:22px;border-radius:50%;border:2px solid #cbd2dc;flex:none;"></span>
              <span style="font-size:17px;">Dept Head HQ</span>
            </label>
            <label style="display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:10px;cursor:pointer;">
              <span style="width:22px;height:22px;border-radius:50%;border:2px solid #cbd2dc;flex:none;"></span>
              <span style="font-size:17px;">Dept Head Branch</span>
            </label>
          </div>
        </div>
      </div>

      <!-- partially hidden End Date field behind dropdown -->
      <div class="field" style="margin-top:14px;opacity:.5;">
        <label style="font-size:15px;">End Date</label>
      </div>
    </div>

    <!-- sticky footer -->
    <div style="position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:16px 18px;display:flex;gap:14px;">
      <button class="btn btn-outline btn-lg" style="flex:1;font-size:16px;">Cancel</button>
      <button class="btn btn-primary btn-lg" style="flex:1;font-size:16px;">Save</button>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
