<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Candidate Profile — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile" style="position:relative;min-height:100vh;background:linear-gradient(160deg,#3a4a5a,#1c2630 60%,#2a2018);display:flex;align-items:center;justify-content:center;padding:28px 18px;">
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(40,55,70,.55),rgba(20,25,30,.7));"></div>

  <!-- glass sign-in card -->
  <div style="position:relative;width:100%;background:rgba(30,36,44,.55);backdrop-filter:blur(2px);border-radius:22px;padding:34px 26px 30px;color:#fff;">
    <!-- logo -->
    <div style="text-align:center;color:#fff;">
      <svg width="120" height="120" viewBox="0 0 32 32" fill="none" style="margin:0 auto;"><circle cx="14" cy="14" r="9.5" stroke="#fff" stroke-width="2.4"/><circle cx="14" cy="14" r="3.4" fill="#fff"/><circle cx="24.5" cy="14" r="1.3" fill="#fff"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>
      <div style="font-family:'Poppins';font-weight:600;font-size:36px;letter-spacing:-.02em;margin-top:2px;">proconnect</div>
    </div>

    <h1 style="font-size:30px;font-weight:800;margin-top:26px;color:#fff;">Sign In</h1>
    <p style="color:rgba(255,255,255,.82);font-size:15px;margin-top:4px;">Please Sign in to your account to continue</p>

    <div style="margin-top:28px;">
      <input placeholder="Insert Email Address" style="width:100%;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.4);color:#fff;font:inherit;font-size:18px;padding:8px 0;outline:none;" />
    </div>
    <div style="margin-top:24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.4);">
      <input placeholder="Insert Password" type="password" style="flex:1;background:none;border:none;color:#fff;font:inherit;font-size:18px;padding:8px 0;outline:none;" />
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </div>

    <button class="btn btn-primary btn-block" style="margin-top:28px;padding:16px;font-size:17px;letter-spacing:.02em;">SIGN IN</button>

    <p style="text-align:center;color:rgba(255,255,255,.85);font-size:15px;margin-top:24px;">Or sign in via :</p>
    <button class="btn btn-white btn-block" style="margin-top:14px;padding:16px;font-size:16px;color:#3c4043;font-weight:700;">
      <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
      GOOGLE
    </button>

    <p style="text-align:center;color:rgba(255,255,255,.85);font-size:15px;margin-top:26px;line-height:1.6;">By continuing sign in, you agree to ProConnect <a href="#" style="color:#7eb6ff;text-decoration:underline;">Term of Service</a> and acknowledge our <a href="#" style="color:#7eb6ff;text-decoration:underline;">Privacy Policy</a></p>

    <div style="margin-top:30px;"><a href="#" style="color:#5fa0ff;font-weight:700;font-size:18px;">Forget Password?</a></div>
    <div style="margin-top:20px;"><a href="#" style="color:#5fa0ff;font-weight:700;font-size:18px;">Create an account</a></div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
