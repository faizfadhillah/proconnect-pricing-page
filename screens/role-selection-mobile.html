<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Role Selection — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>
<div class="mobile">
  <div class="m-header">
    <button class="hamburger" aria-label="Menu" style="background:none;border:none;color:#2563EB;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a class="brand" href="../index.html">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="14" cy="14" r="9.5" stroke="#2563EB" stroke-width="2.6"/><circle cx="14" cy="14" r="3.4" fill="#2563EB"/><line x1="20.5" y1="20.5" x2="28" y2="28" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span class="brand-name">proconnect</span>
    </a>
    <span style="margin-left:auto;"></span>
    <button class="bell" aria-label="Notifications" style="background:none;border:none;color:#1f2937;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="bell-badge">999</span></button>
  </div>

  <div class="m-body" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 22px;">
    <!-- OOPS illustration -->
    <div style="position:relative;width:280px;height:230px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
      <svg viewBox="0 0 280 230" width="280" height="230" fill="none">
        <!-- back cloud -->
        <path d="M150 30c30-14 70-8 80 22 28 4 44 30 30 56-8 30-44 40-70 30-20 18-58 20-78 2-30 6-58-14-56-44-18-22-6-56 24-62 12-26 48-34 70-22z" fill="#3f74d6" opacity=".55"/>
        <!-- front cloud -->
        <path d="M70 40c26-18 66-16 84 10 30 0 50 26 38 54-4 30-40 44-68 36-22 16-60 14-78-8-30 0-52-26-40-54-14-24 2-56 32-58 8-12 18-18 32-16z" fill="#2563eb"/>
        <!-- OOPS text -->
        <text x="140" y="115" text-anchor="middle" font-family="Poppins,Inter,sans-serif" font-weight="800" font-size="58" letter-spacing="2">
          <tspan fill="#f97316">O</tspan><tspan fill="#f4c84c">OP</tspan><tspan fill="#ffffff">S</tspan>
        </text>
      </svg>
    </div>

    <h1 style="font-size:26px;font-weight:700;line-height:1.25;max-width:300px;">Your Company Setup Isn&rsquo;t Complete Yet</h1>
    <p class="muted" style="margin-top:18px;font-size:17px;line-height:1.55;max-width:320px;">Your account is ready, but your company profile still needs to be completed by your admin before you can continue.</p>

    <div style="width:100%;max-width:330px;margin-top:40px;">
      <button class="btn btn-primary btn-block btn-lg">Notify Admin</button>
      <button class="btn btn-outline btn-block btn-lg" style="margin-top:16px;">Check Again</button>
    </div>
  </div>
</div>
<script src="../assets/app.js"></script></body></html>
