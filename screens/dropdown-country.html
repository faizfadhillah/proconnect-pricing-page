<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProConnect — Dropdown — Country Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/app.css">
</head><body>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;background:var(--bg);">
  <div style="width:100%;max-width:600px;">
    <div class="card" style="border-radius:12px;overflow:hidden;box-shadow:var(--shadow);">
      <!-- search field -->
      <div style="display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" value="SG" aria-label="Search country"
          style="border:none;outline:none;font:600 16px 'Inter',sans-serif;color:var(--ink);background:none;flex:1;">
      </div>
      <!-- result list -->
      <ul style="list-style:none;">
        <li style="padding:16px 18px;font-size:16px;color:var(--ink);cursor:pointer;">
          (<b style="font-weight:700;">SG</b>D) Singapore
        </li>
      </ul>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script></body></html>
